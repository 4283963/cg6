server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/underpass_flood?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

mqtt:
  broker: tcp://127.0.0.1:1883
  client-id: underpass-backend
  username: ""
  password: ""
  topic:
    sensor-data: underpass/sensor/data
    flow-data: underpass/upstream/flow
    rainfall-data: underpass/sensor/rainfall
    command-prefix: underpass/command
    hydraulic-status: underpass/status/hydraulic

flood:
  threshold-mm: 100
  lift-height-cm: 15
  confirm-rounds: 3
  cooldown-seconds: 60
  forecast:
    pre-lift-height-cm: 5
    flow-surge-ratio: 3.0
    flow-window-minutes: 10
    forecast-cooldown-minutes: 30
    min-rain-mm-per-hour: 0.5

led:
  api-url: http://road-admin.example.com/api/v1/led/control
  api-key: dummy-key-for-demo
  danger-text: "\u79EF\u6C34\u5371\u9669\uFF0C\u7981\u6B62\u901A\u884C"
