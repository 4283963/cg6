version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: underpass-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: underpass_flood
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: underpass-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: underpass-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - mosquitto
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/underpass_flood?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      MQTT_BROKER: tcp://mosquitto:1883

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: underpass-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  mosquitto-data:
  mosquitto-log:
